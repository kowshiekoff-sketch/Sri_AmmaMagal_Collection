<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri AmmaMagal Collection</title>

<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:#f5f5f5}
header {background:#8B0000;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center}
.logo img{height:110px;margin-right:10px}
.auth-buttons button{margin-left:10px;padding:8px 15px;border:none;background:white;color:#8B0000;font-weight:bold;border-radius:5px;cursor:pointer}
nav{background:#222;padding:12px;text-align:center}
nav a{color:white;margin:0 15px;text-decoration:none;font-weight:bold}
.section{display:none;padding:40px}
.active{display:block}
.products{display:flex;flex-wrap:wrap;justify-content:center}
.card{background:white;width:260px;margin:15px;border-radius:12px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);transition:0.3s}
.card:hover{transform:scale(1.05)}
.card img{width:100%;height:300px;object-fit:cover}
.card-content{padding:15px;text-align:center}
.price{color:green;font-weight:bold}
.order-btn{background:#25D366;color:white;border:none;padding:10px;margin-top:10px;width:100%;border-radius:5px;cursor:pointer}
footer{background:#8B0000;color:white;text-align:center;padding:10px}
.hero{background:url('https://images.unsplash.com/photo-1445205170230-053b83016050');background-size:cover;color:white;text-align:center;padding:100px 20px}
.hero h1{font-size:40px}

/* LOGIN PAGE */
#loginPage{display:none;text-align:center;padding:50px}
#loginPage input{padding:10px;margin:10px;width:250px}

</style>
</head>
<body>

<header>
<div class="logo">
<img src="logo.jpg">
<h1>Sri AmmaMagal Collection</h1>
</div>
<div class="auth-buttons">
<button onclick="showLogin()">Login</button>
</div>
</header>

<nav>
<a href="#" onclick="showSection('home')">Home</a>
<a href="#" onclick="showSection('collection')">Shop</a>
</nav>

<div id="home" class="section active">
<div class="hero">
<h1>Elegant Fashion for Every Occasion</h1>
<p>Shop the latest trends now</p>
</div>
</div>

<div id="collection" class="section">
<h2 style="text-align:center">Our Collection</h2>
<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1610030469983-98e550d6193c">
<div class="card-content">
<h3>Saree</h3>
<p class="price">₹1500</p>
<button class="order-btn" onclick="orderWhatsApp('Saree',1500)">Order on WhatsApp</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525507119028-ed4c629a60a3">
<div class="card-content">
<h3>T-Shirt & Jeans</h3>
<p class="price">₹800</p>
<button class="order-btn" onclick="orderWhatsApp('T-Shirt & Jeans',800)">Order on WhatsApp</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1539008835657-9e8e9680c956">
<div class="card-content">
<h3>Evening Gown</h3>
<p class="price">₹3000</p>
<button class="order-btn" onclick="orderWhatsApp('Evening Gown',3000)">Order on WhatsApp</button>
</div>
</div>

</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage">
<h2>Login</h2>
<input type="text" id="phone" placeholder="Phone Number"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="loginUser()">Login</button>
</div>

<footer>
<p>© 2026 Sri AmmaMagal Collection</p>
</footer>

<script>

let users=[
{phone:"9876543210",password:"1234",history:["Saree ₹1500","T-Shirt ₹800"]}
];

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
document.getElementById('loginPage').style.display='none';
}

function showLogin(){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById('loginPage').style.display='block';
}

function loginUser(){
let phone=document.getElementById('phone').value;
let pass=document.getElementById('password').value;

let user=users.find(u=>u.phone===phone && u.password===pass);

if(user){
alert("Login Successful ✅");
showSection('collection');

if(user.history.length>0){
alert("Your Previous Orders:\n"+user.history.join("\n"));
}

}else{
alert("Invalid Phone or Password ❌");
}
}

function orderWhatsApp(product,price){
let phone="919790401824";
let message=`Hello, I want to order ${product} for ₹${price}`;
window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
}

</script>

</body>
</html>
