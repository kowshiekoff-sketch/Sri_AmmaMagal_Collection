<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri AmmaMagal Collection</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f5f5f5}
header{background:#8B0000;color:white;padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center}
nav{background:#222;padding:12px;text-align:center}
nav a{color:white;margin:0 15px;text-decoration:none}
.section{display:none;padding:30px}
.active{display:block}
.products{display:flex;flex-wrap:wrap;justify-content:center}
.card{background:white;width:250px;margin:15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.card img{width:100%;height:250px;object-fit:cover}
.card-content{text-align:center;padding:10px}
.price{color:green;font-weight:bold}
button{padding:8px;margin:5px;border:none;border-radius:5px;cursor:pointer}
.cart-btn{background:#ff9800;color:white}
.order-btn{background:#25D366;color:white}
#profile{background:white;padding:20px;margin:20px;border-radius:10px}
</style>
</head>
<body>

<header>
<div class="logo"><h2>Sri AmmaMagal</h2></div>
<div>
<button onclick="showLogin()">Login / Signup</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<nav>
<a href="#" onclick="showSection('home')">Home</a>
<a href="#" onclick="showSection('shop')">Shop</a>
<a href="#" onclick="showSection('profile')">Profile</a>
</nav>

<div id="home" class="section active"><h2>Welcome</h2></div>

<div id="shop" class="section">
<h2>Products</h2>
<div class="products" id="productList"></div>
</div>

<div id="profile" class="section">
<h2>Your Profile</h2>
<p id="userInfo"></p>
<h3>Your Orders</h3>
<div id="orderHistory"></div>
</div>

<!-- LOGIN + SIGNUP PAGE -->
<div id="loginPage" class="section">
<h2>Login / Signup</h2>
<input type="email" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<button onclick="signup()">Signup</button>
</div>

<script>

// Firebase config
const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();

let currentUser=null;

// Products
const products=[
{id:1,name:'Saree',price:1500,img:'https://images.unsplash.com/photo-1610030469983-98e550d6193c'},
{id:2,name:'T-Shirt',price:800,img:'https://images.unsplash.com/photo-1525507119028-ed4c629a60a3'}
];

function displayProducts(){
let html='';
products.forEach(p=>{
html+=`<div class='card'>
<img src='${p.img}'>
<div class='card-content'>
<h3>${p.name}</h3>
<p class='price'>₹${p.price}</p>
<button class='cart-btn' onclick='addToCart(${p.id})'>Add to Cart</button>
<button class='order-btn' onclick='order(${p.id})'>Order</button>
</div></div>`;
});
document.getElementById('productList').innerHTML=html;
}

displayProducts();

function showSection(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function showLogin(){showSection('loginPage');}

// SIGNUP
function signup(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;

if(!email || !pass){alert("Enter email & password");return}

auth.createUserWithEmailAndPassword(email,pass)
.then(()=>{
alert('Signup successful ✅ Now login');
})
.catch(err=>alert(err.message));
}

// LOGIN
function login(){
let email=document.getElementById('email').value;
let pass=document.getElementById('password').value;

auth.signInWithEmailAndPassword(email,pass)
.then(user=>{
currentUser=user.user;
alert('Login Successful ✅');
loadProfile();
showSection('shop');
})
.catch(err=>alert(err.message));
}

function logout(){
auth.signOut();
currentUser=null;
alert('Logged out');
showSection('home');
}

// Cart per user
async function addToCart(id){
if(!currentUser){alert('Login first');return}
let item=products.find(p=>p.id===id);
await db.collection('users').doc(currentUser.uid).collection('cart').add(item);
alert('Added to cart');
}

// Order + save history
async function order(id){
if(!currentUser){alert('Login first');return}
let item=products.find(p=>p.id===id);
await db.collection('users').doc(currentUser.uid).collection('orders').add(item);
alert('Order placed');
loadProfile();
}

// Profile
async function loadProfile(){
document.getElementById('userInfo').innerText=currentUser.email;
let snapshot=await db.collection('users').doc(currentUser.uid).collection('orders').get();
let html='';
snapshot.forEach(doc=>{let d=doc.data();html+=`<p>${d.name} - ₹${d.price}</p>`});
document.getElementById('orderHistory').innerHTML=html;
}

</script>

</body>
</html>
